    description: REST adapter for Google Cloud Data Catalog API — EntryGroups. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/locations/{location}/entrygroups
      name: projects-projectid-locations-location-entrygroups
      description: REST surface for projects-projectId-locations-location-entryGroups.
      operations:
      - method: GET
        name: listentrygroups
        description: Google Cloud Data Catalog List entry groups
        call: google-cloud-data-catalog-entrygroups.listentrygroups
        with:
          projectId: rest.projectId
          location: rest.location
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createentrygroup
        description: Google Cloud Data Catalog Create an entry group
        call: google-cloud-data-catalog-entrygroups.createentrygroup
        with:
          projectId: rest.projectId
          location: rest.location
          entryGroupId: rest.entryGroupId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
