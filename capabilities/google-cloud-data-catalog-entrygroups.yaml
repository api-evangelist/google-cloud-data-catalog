    baseUri: https://datacatalog.googleapis.com/v1
    description: Google Cloud Data Catalog API — EntryGroups business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-locations-location-entryGroups
      path: /projects/{projectId}/locations/{location}/entryGroups
      operations:
      - name: listentrygroups
        method: GET
        description: Google Cloud Data Catalog List entry groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
      - name: createentrygroup
        method: POST
        description: Google Cloud Data Catalog Create an entry group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        - name: entryGroupId
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
