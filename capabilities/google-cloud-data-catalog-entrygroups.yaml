      with:
        projectId: tools.projectId
        location: tools.location
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: google-cloud-data-catalog-create
      description: Google Cloud Data Catalog Create an entry group
      hints:
