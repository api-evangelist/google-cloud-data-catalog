aid: google-cloud-data-catalog
name: Google Cloud Data Catalog
description: Google Cloud Data Catalog is a fully managed, scalable metadata management service that helps organizations discover,
  understand, and manage their data. It provides a unified view of data assets across Google Cloud and allows users to search,
  tag, and classify data resources.
